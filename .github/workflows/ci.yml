name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 消除 Node.js 20 警告

jobs:
  build:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # 某个矩阵失败不取消其他任务
      matrix:
        os: [ubuntu-24.04, windows-latest]
        build_type: [Release, Debug]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Linux ──────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build gcc-14 g++-14 libssl-dev
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_STANDARD=23

      # ── Windows ────────────────────────────────────────
      - name: Install OpenSSL (Windows)
        if: runner.os == 'Windows'
        run: choco install openssl -y

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@v5   # v5 支持 Node.js 24

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_STANDARD=23 -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL-Win64"

      # ── 通用步骤 ────────────────────────────────────────
      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Install
        run: cmake --install build --prefix install_prefix
